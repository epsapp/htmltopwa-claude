<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VMA Tracker — Course de Durée</title>
<link rel="manifest" href="./manifest.json">
<meta name="application-name" content="VMA Tracker">
<meta name="description" content="Application EPS — course de durée basée sur la VMA">
<meta name="theme-color" content="#00e5ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VMA Tracker">
<link rel="apple-touch-icon" href="./icons/icon-152.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="shortcut icon" href="./icons/icon-96.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap');
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1f2b;--border:#252b38;--accent:#00e5ff;--green:#00ff88;--red:#ff2d55;--yellow:#ffd700;--orange:#ff9500;--text:#e8eaf0;--muted:#5a6070;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
header h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--accent);}
.step-indicator{display:flex;gap:6px;margin-left:auto;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.85rem;background:var(--surface2);border:2px solid var(--border);color:var(--muted);transition:all .3s;}
.step-dot.active{border-color:var(--accent);color:var(--accent);}
.step-dot.done{background:var(--accent);border-color:var(--accent);color:var(--bg);}
.screen{display:none;padding:20px;max-width:960px;margin:0 auto;}
.screen.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--accent);margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.three{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:600px){.form-grid,.form-grid.three{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;width:100%;transition:border-color .2s;}
input:focus,select:focus{outline:none;border-color:var(--accent);}
.series-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:6px;}
.series-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);min-width:60px;}
.btn{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:var(--bg);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:var(--bg);}
.btn-warning{background:var(--yellow);color:var(--bg);}
.btn-orange{background:var(--orange);color:var(--bg);}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.runner-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.runner-tab{flex:1;padding:10px 6px;text-align:center;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:1px;background:var(--surface2);color:var(--muted);border:none;transition:all .2s;}
.runner-tab.active{background:var(--accent);color:var(--bg);}
hr{border:none;border-top:1px solid var(--border);margin:14px 0;}
.tag{display:inline-block;padding:2px 8px;border-radius:16px;font-size:.65rem;font-weight:700;letter-spacing:1px;}
.tag-green{background:rgba(0,255,136,.15);color:var(--green);}
.tag-red{background:rgba(255,45,85,.15);color:var(--red);}
.tag-orange{background:rgba(255,149,0,.15);color:var(--orange);}
/* Toggle dispensé */
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:14px;}
.toggle-wrap.on{border-color:var(--orange);background:rgba(255,149,0,.08);}
.toggle{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--orange);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle.on::after{transform:translateX(20px);}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:500px;width:92%;text-align:center;}
.modal-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--accent);margin-bottom:10px;}
.modal-box p{color:var(--muted);margin-bottom:20px;font-size:.85rem;}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.modal-btn{flex:1;min-width:80px;padding:12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;background:var(--surface2);color:var(--text);transition:all .2s;}
.modal-btn:hover{border-color:var(--accent);color:var(--accent);}
/* ═══ SPLIT SCREEN COURSE ═══ */
.course-split{display:grid;grid-template-columns:1fr 1fr;gap:4px;min-height:calc(100vh - 120px);}
.course-split .lane{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.course-split .lane.left{border-color:var(--accent);}
.course-split .lane.right{border-color:var(--green);}
.lane-header{text-align:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.lane-runner{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--accent);}
.lane.right .lane-runner{color:var(--green);}
.lane-observer{font-size:.65rem;color:var(--orange);margin-top:2px;}
.lane-serie{font-size:.65rem;color:var(--muted);margin-top:2px;}
.lane-chrono{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:3px;color:var(--accent);text-align:center;line-height:1;margin:6px 0;}
.lane.right .lane-chrono{color:var(--green);}
.lane-target{text-align:center;color:var(--muted);font-size:.7rem;font-family:'DM Mono',monospace;}
.lane-bar{height:4px;background:var(--surface2);border-radius:2px;margin:6px 0;overflow:hidden;}
.lane-bar-inner{height:100%;background:var(--accent);transition:width .5s linear;border-radius:2px;}
.lane.right .lane-bar-inner{background:var(--green);}
.lane-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.lane-info-box{background:var(--surface2);border-radius:6px;padding:6px;text-align:center;border:1px solid var(--border);}
.lane-info-box .v{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;}
.lane-info-box .l{font-size:.5rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.lane-feedback{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;padding:6px;border-radius:6px;margin:4px 0;min-height:32px;}
.lane-feedback.ok{background:rgba(0,255,136,.15);color:var(--green);}
.lane-feedback.fast{background:rgba(255,45,85,.15);color:var(--red);}
.lane-feedback.slow{background:rgba(255,215,0,.15);color:var(--yellow);}
.lane-plot{width:100px;height:100px;border-radius:50%;border:3px solid var(--accent);background:var(--surface2);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:8px auto;transition:all .15s;user-select:none;}
.lane.right .lane-plot{border-color:var(--green);color:var(--green);}
.lane-plot:active{transform:scale(.92);background:rgba(0,229,255,.15);}
.lane.right .lane-plot:active{background:rgba(0,255,136,.15);}
.lane-plot.off{opacity:.3;pointer-events:none;}
.lane-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:auto;padding-top:8px;}
.lane-btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:1px;transition:all .2s;}
.lane-btn-marche{border:2px solid var(--red);background:transparent;color:var(--red);}
.lane-btn-marche.active{background:var(--red);color:#fff;}
.lane-btn-stop{background:var(--orange);color:var(--bg);}
/* Global chrono bar for split mode */
.global-chrono{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;gap:16px;}
.global-chrono-time{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--accent);}
.global-chrono-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.global-chrono-bar-inner{height:100%;background:var(--accent);transition:width .5s linear;border-radius:3px;}
.global-btns{display:flex;gap:8px;align-items:center;}
/* Single runner mode (2 élèves) */
.course-single .chrono-display{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;letter-spacing:5px;color:var(--accent);text-align:center;line-height:1;}
.course-single .chrono-target{text-align:center;color:var(--muted);font-size:.8rem;margin-top:4px;font-family:'DM Mono',monospace;}
.course-single .chrono-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;margin:10px 0;overflow:hidden;}
.course-single .chrono-bar{height:100%;background:var(--accent);transition:width .5s linear,background .3s;border-radius:3px;}
.course-single .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.course-single .info-box{background:var(--surface2);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border);}
.course-single .info-box .val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;}
.course-single .info-box .lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.val.green{color:var(--green);}.val.red{color:var(--red);}.val.yellow{color:var(--yellow);}.val.accent{color:var(--accent);}
.course-single .feedback-badge{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;padding:10px;border-radius:8px;margin:8px 0;transition:all .3s;}
.course-single .feedback-badge.ok{background:rgba(0,255,136,.15);color:var(--green);border:1px solid var(--green);}
.course-single .feedback-badge.fast{background:rgba(255,45,85,.15);color:var(--red);border:1px solid var(--red);}
.course-single .feedback-badge.slow{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid var(--yellow);}
.course-single .feedback-badge.hidden{opacity:0;}
.course-single .btn-plot{width:140px;height:140px;border-radius:50%;border:4px solid var(--accent);background:var(--surface2);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 0 20px rgba(0,229,255,.1);margin:14px auto;}
.course-single .btn-plot:active{transform:scale(.95);box-shadow:0 0 40px rgba(0,229,255,.4);}
.course-single .btn-plot.off{opacity:.3;pointer-events:none;}
.course-single .btn-marche{padding:8px 16px;border-radius:8px;border:2px solid var(--red);background:transparent;color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;cursor:pointer;}
.course-single .btn-marche.active{background:var(--red);color:#fff;}
.current-runner-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--accent);border-radius:16px;padding:4px 12px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--accent);}
.observer-badge{font-size:.7rem;color:var(--orange);margin-top:2px;}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
/* Results */
.result-block{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:10px;border-left:4px solid var(--accent);}
.result-block.dispensed{border-left-color:var(--orange);}
.result-block h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;margin-bottom:8px;color:var(--accent);}
/* QR */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.qr-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.qr-card h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--accent);margin-bottom:4px;}
.qr-wrap{background:#fff;border-radius:8px;padding:10px;display:inline-block;margin:8px 0;}
.qr-status{border-radius:6px;padding:6px;margin-top:6px;font-size:.7rem;}
.qr-status.ok{background:rgba(0,255,136,.1);color:var(--green);}
.qr-status.warn{background:rgba(255,215,0,.1);color:var(--yellow);}
.scanner-url{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);word-break:break-all;margin-top:6px;padding:4px;background:var(--bg);border-radius:4px;max-height:40px;overflow:auto;}
@media(max-width:500px){.course-single .chrono-display{font-size:3.2rem;}.course-single .btn-plot{width:110px;height:110px;}.lane-chrono{font-size:2.2rem;}.lane-plot{width:80px;height:80px;font-size:.85rem;}}
</style>
</head>
<body>
<header>
  <div><div style="font-size:.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;">EPS — Course de Durée</div><h1>VMA Tracker</h1></div>
  <div class="step-indicator"><div class="step-dot active" id="dot1">1</div><div class="step-dot" id="dot2">2</div><div class="step-dot" id="dot3">3</div><div class="step-dot" id="dot4">4</div><div class="step-dot" id="dot5">QR</div></div>
</header>
<div class="modal-overlay" id="modal"><div class="modal-box" id="modalBox"></div></div>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <div class="card">
    <h2>⚙ Configuration</h2>
    <div class="form-grid three">
      <div class="field"><label>Piste (m)</label><input type="number" id="distPiste" value="400" min="50" step="10"></div>
      <div class="field"><label>Plots (m)</label><input type="number" id="distPlots" value="25" min="5" step="5"></div>
      <div class="field"><label>Élèves / tablette</label><select id="nbRunners"><option value="2">2 (1 binôme)</option><option value="4">4 (2 binômes)</option></select></div>
    </div>
    <div class="form-grid" style="margin-top:12px;">
      <div class="field"><label>Séance</label><input type="text" id="nomSeance" placeholder="Séance 3 — Aérobie"></div>
      <div class="field"><label>Classe</label><input type="text" id="nomClasse" placeholder="3ème A"></div>
    </div>
    <div class="field" style="margin-top:12px;max-width:200px;"><label>Date</label><input type="date" id="dateSeance"></div>
  </div>
  <div class="card">
    <h2>🏃 Séries</h2>
    <p style="color:var(--muted);font-size:.8rem;margin-bottom:12px;">Multiple de 1min30</p>
    <div class="field" style="margin-bottom:12px;max-width:160px;"><label>Nb séries</label><input type="number" id="nbSeries" value="3" min="1" max="10" oninput="genSeries()"></div>
    <div id="seriesInputs"></div>
    <div class="actions"><button class="btn btn-secondary" onclick="genSeries()">↺ Actualiser</button><button class="btn btn-primary" onclick="goStep2()">Suivant →</button></div>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <div class="runner-tabs" id="runnerTabs"></div>
  <div id="runnerSetups"></div>
  <div class="actions"><button class="btn btn-secondary" onclick="goStep(0)">← Retour</button><button class="btn btn-primary" onclick="goStep3()">Suivant →</button></div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3"><div id="courseContainer"></div>
  <div class="actions" style="margin-top:12px;"><button class="btn btn-success" onclick="goStep4()">✓ Terminer la séance</button></div>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="screen4">
  <div class="card"><h2>📊 Bilan</h2><div id="resultsContent"></div></div>
  <div class="actions"><button class="btn btn-primary" onclick="exportCSV()">⬇ CSV</button><button class="btn btn-success" onclick="goStep5()">📱 QR →</button><button class="btn btn-secondary" onclick="location.reload()">↺ Nouveau</button></div>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="screen5">
  <div class="card"><h2>📱 QR Codes</h2><p style="color:var(--muted);font-size:.8rem;margin-bottom:16px;">Scannez depuis l'app Prof.</p><div class="qr-grid" id="qrGrid"></div></div>
  <div class="actions"><button class="btn btn-secondary" onclick="goStep(3)">← Retour</button><button class="btn btn-secondary" onclick="location.reload()">↺ Nouveau</button></div>
</div>

<script>
const AGG_URL='https://epsapp.github.io/htmltopwa-claude/agregateur-vma.html';
const S={distPiste:400,distPlots:25,nomSeance:'',nomClasse:'',dateSeance:'',nbRunners:2,series:[],runners:[],data:[],
  chrono:{interval:null,start:null,elapsed:0,running:false,finished:false,serieIdx:0},
  // Per-lane state for split mode
  lanes:[{plotCount:0,colCount:0,marcheNext:false},{plotCount:0,colCount:0,marcheNext:false}]
};

function ms2s(ms){const t=Math.floor(ms/1000),m=Math.floor(t/60),s=t%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function goStep(n){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));document.getElementById('screen'+(n+1)).classList.add('active');document.querySelectorAll('.step-dot').forEach((d,i)=>{d.classList.toggle('active',i===n);d.classList.toggle('done',i<n);});window.scrollTo(0,0);}

// ══════ STEP 1 ══════
function genSeries(){const nb=parseInt(document.getElementById('nbSeries').value)||3;const w=document.getElementById('seriesInputs');w.innerHTML='';for(let i=0;i<nb;i++){const p=S.series[i];const dm=p?Math.floor(p.dureeMs/60000):(i+1)*3;const ds=p?Math.floor((p.dureeMs%60000)/1000):0;const r=document.createElement('div');r.className='series-row';r.innerHTML='<span class="series-label">S'+(i+1)+'</span><div class="field" style="flex:1"><label>Min</label><input type="number" id="sm'+i+'" value="'+dm+'" min="1"></div><div class="field" style="flex:1"><label>Sec</label><select id="ss'+i+'"><option value="0"'+(ds===0?' selected':'')+'>00</option><option value="30"'+(ds===30?' selected':'')+'>30</option></select></div><div style="font-size:.65rem;color:var(--muted);min-width:60px;" id="si'+i+'"></div>';w.appendChild(r);document.getElementById('sm'+i).oninput=()=>updSI(i);document.getElementById('ss'+i).onchange=()=>updSI(i);updSI(i);}}
function updSI(i){const m=document.getElementById('sm'+i),s=document.getElementById('ss'+i);if(!m||!s)return;const ms=(parseInt(m.value)||0)*60000+(parseInt(s.value)||0)*1000;const c=ms/90000;document.getElementById('si'+i).textContent=(ms>0&&Number.isInteger(c))?c+' col':'⚠';}

function goStep2(){const nb=parseInt(document.getElementById('nbSeries').value)||3;const ser=[];for(let i=0;i<nb;i++){const m=document.getElementById('sm'+i),s=document.getElementById('ss'+i);if(!m||!s){alert("Cliquez Actualiser");return;}const ms=(parseInt(m.value)||0)*60000+(parseInt(s.value)||0)*1000;if(ms<=0||ms%90000!==0){alert('Série '+(i+1)+' invalide');return;}ser.push({dureeMs:ms,nbCols:ms/90000});}
S.series=ser;S.distPiste=parseInt(document.getElementById('distPiste').value)||400;S.distPlots=parseInt(document.getElementById('distPlots').value)||25;S.nbRunners=parseInt(document.getElementById('nbRunners').value)||2;S.nomSeance=document.getElementById('nomSeance').value||'Séance';S.nomClasse=document.getElementById('nomClasse').value||'';S.dateSeance=document.getElementById('dateSeance').value||new Date().toISOString().slice(0,10);
while(S.runners.length<S.nbRunners)S.runners.push({name:'',vma:12,projets:[],dispensed:false,observes:null});S.runners.length=S.nbRunners;
S.data=[];for(let r=0;r<S.nbRunners;r++){S.data.push([]);for(let i=0;i<nb;i++)S.data[r].push({passages:[],marcheIndices:[],colStarts:[],stoppedEarly:false,stoppedAtMs:0});}
buildProfiles();goStep(1);}

// ══════ STEP 2 ══════
function buildProfiles(){const tw=document.getElementById('runnerTabs'),sw=document.getElementById('runnerSetups');tw.innerHTML='';sw.innerHTML='';
for(let r=0;r<S.nbRunners;r++){const t=document.createElement('button');t.className='runner-tab'+(r===0?' active':'');t.id='tab'+r;t.textContent='Élève '+(r+1);t.onclick=()=>showR(r);tw.appendChild(t);
const p=document.createElement('div');p.id='rSetup'+r;p.style.display=r===0?'':'none';const pr=S.runners[r];
p.innerHTML='<div class="card"><h2>Élève '+(r+1)+'</h2><div class="toggle-wrap'+(pr.dispensed?' on':'')+'" id="tw'+r+'"><div class="toggle'+(pr.dispensed?' on':'')+'" id="td'+r+'" onclick="togDisp('+r+')"></div><span id="tl'+r+'">'+(pr.dispensed?'🩹 Dispensé':'Coureur')+'</span></div><div class="form-grid"><div class="field"><label>Nom</label><input type="text" id="rn'+r+'" value="'+(pr.name||'')+'"></div><div id="vf'+r+'"'+(pr.dispensed?' style="display:none"':'')+'><div class="field"><label>VMA</label><input type="number" id="rv'+r+'" value="'+(pr.vma||12)+'" step="0.5" min="6" max="25"></div></div></div><div id="of'+r+'"'+(pr.dispensed?'':' style="display:none"')+'><div class="field" style="margin-top:10px"><label>Observe</label><select id="ro'+r+'"></select></div></div></div><div id="pw'+r+'"'+(pr.dispensed?' style="display:none"':'')+'><div class="card"><h2>Vitesses cibles</h2><div id="rp'+r+'"></div></div></div>';
sw.appendChild(p);}
for(let r=0;r<S.nbRunners;r++){buildProj(r);buildObsSel(r);}}

function togDisp(r){S.runners[r].dispensed=!S.runners[r].dispensed;const on=S.runners[r].dispensed;document.getElementById('td'+r).classList.toggle('on',on);document.getElementById('tw'+r).classList.toggle('on',on);document.getElementById('tl'+r).textContent=on?'🩹 Dispensé':'Coureur';document.getElementById('vf'+r).style.display=on?'none':'';document.getElementById('of'+r).style.display=on?'':'none';document.getElementById('pw'+r).style.display=on?'none':'';for(let i=0;i<S.nbRunners;i++)buildObsSel(i);}
function buildObsSel(r){const s=document.getElementById('ro'+r);if(!s)return;s.innerHTML='<option value="">—</option>';for(let i=0;i<S.nbRunners;i++){if(i===r||S.runners[i].dispensed)continue;const n=document.getElementById('rn'+i)?.value||'Élève '+(i+1);s.innerHTML+='<option value="'+i+'"'+(S.runners[r].observes===i?' selected':'')+'>'+n+'</option>';}}
function buildProj(r){const w=document.getElementById('rp'+r);if(!w)return;w.innerHTML='';S.series.forEach((s,i)=>{const pv=S.runners[r].projets?.[i]||'';const d=document.createElement('div');d.className='series-row';d.innerHTML='<span class="series-label">S'+(i+1)+'</span><span style="color:var(--muted);font-size:.75rem;min-width:50px">'+ms2s(s.dureeMs)+'</span><div class="field" style="flex:1"><label>km/h</label><input type="number" id="rp'+r+'s'+i+'" value="'+pv+'" step="0.1" min="4" max="30"></div>';w.appendChild(d);});}
function showR(r){for(let i=0;i<S.nbRunners;i++){document.getElementById('rSetup'+i).style.display=i===r?'':'none';document.getElementById('tab'+i).classList.toggle('active',i===r);}}

function goStep3(){for(let r=0;r<S.nbRunners;r++){const n=document.getElementById('rn'+r).value.trim();if(!n){alert('Élève '+(r+1)+': nom manquant');showR(r);return;}S.runners[r].name=n;
if(S.runners[r].dispensed){const o=document.getElementById('ro'+r).value;if(o===''){alert(n+': pas de coureur assigné');showR(r);return;}S.runners[r].observes=parseInt(o);S.runners[r].vma=0;S.runners[r].projets=[];}
else{const v=parseFloat(document.getElementById('rv'+r).value);if(!v||v<=0){alert(n+': VMA invalide');showR(r);return;}S.runners[r].vma=v;const pj=[];for(let i=0;i<S.series.length;i++){const x=parseFloat(document.getElementById('rp'+r+'s'+i).value);if(!x||x<=0){alert(n+': cible S'+(i+1)+' manquante');showR(r);return;}pj.push(x);}S.runners[r].projets=pj;}
document.getElementById('tab'+r).textContent=(S.runners[r].dispensed?'🩹 ':'')+ S.runners[r].name;}
openStartModal();}

function openStartModal(){const m=document.getElementById('modal'),b=document.getElementById('modalBox');
const active=S.runners.map((r,i)=>({...r,i})).filter(r=>!r.dispensed);if(!active.length){alert('Aucun coureur !');return;}
if(S.nbRunners===4){
  // Mode 4: on demande qui court en premier dans chaque binôme
  // Binôme A = runners 0,1 — Binôme B = runners 2,3
  const bA=S.runners.slice(0,2),bB=S.runners.slice(2,4);
  const aActive=bA.filter(r=>!r.dispensed),bActive=bB.filter(r=>!r.dispensed);
  let html='<h2>Qui court en premier ?</h2><p>Pour chaque binôme, choisissez le premier coureur.<br>L\'autre observera.</p>';
  html+='<div style="margin-bottom:16px"><b style="color:var(--accent)">Binôme A</b><div class="modal-btns" style="margin-top:8px" id="startA">';
  bA.forEach((r,i)=>{if(!r.dispensed)html+='<button class="modal-btn" data-idx="'+i+'" onclick="pickStart(0,'+i+',this)">'+r.name+'</button>';else html+='<div style="color:var(--orange);font-size:.8rem;padding:8px;">🩹 '+r.name+' (dispensé)</div>';});
  html+='</div></div>';
  html+='<div style="margin-bottom:16px"><b style="color:var(--green)">Binôme B</b><div class="modal-btns" style="margin-top:8px" id="startB">';
  bB.forEach((r,i)=>{if(!r.dispensed)html+='<button class="modal-btn" data-idx="'+(i+2)+'" onclick="pickStart(1,'+(i+2)+',this)">'+r.name+'</button>';else html+='<div style="color:var(--orange);font-size:.8rem;padding:8px;">🩹 '+r.name+' (dispensé)</div>';});
  html+='</div></div>';
  html+='<button class="btn btn-primary" id="btnGoSplit" onclick="startSplit()" style="width:100%;margin-top:12px;" disabled>▶ DÉMARRER LA SÉANCE</button>';
  b.innerHTML=html;
  window._splitStarters=[null,null];
  m.classList.add('open');
} else {
  // Mode 2: comme avant
  b.innerHTML='<h2>Qui commence ?</h2><p>Premier coureur</p><div class="modal-btns">'+active.map(r=>'<button class="modal-btn" onclick="startSingle('+r.i+')">'+r.name+'</button>').join('')+'</div>';
  m.classList.add('open');
}}

window._splitStarters=[null,null];
function pickStart(binome,idx,btn){window._splitStarters[binome]=idx;btn.parentElement.querySelectorAll('.modal-btn').forEach(b=>{b.style.borderColor=b===btn?'var(--accent)':'var(--border)';b.style.color=b===btn?'var(--accent)':'';});if(window._splitStarters[0]!==null&&window._splitStarters[1]!==null)document.getElementById('btnGoSplit').disabled=false;}

function startSingle(idx){document.getElementById('modal').classList.remove('open');S.chrono.serieIdx=0;buildSingleCourse(idx);goStep(2);}
function startSplit(){document.getElementById('modal').classList.remove('open');S.chrono.serieIdx=0;buildSplitCourse(window._splitStarters[0],window._splitStarters[1]);goStep(2);}

// ══════ STEP 3 — SINGLE MODE (2 élèves) ══════
let _singleRunner=0;
function buildSingleCourse(rIdx){_singleRunner=rIdx;const si=S.chrono.serieIdx;const r=S.runners[rIdx],serie=S.series[si];
const obs=S.runners.find(x=>x.dispensed&&x.observes===rIdx);
const c=document.getElementById('courseContainer');
c.innerHTML='<div class="course-single"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px"><div><div class="current-runner-badge"><div class="dot-live"></div>'+r.name+' — S'+(si+1)+'</div>'+(obs?'<div class="observer-badge">👁 '+obs.name+'</div>':'')+'<div style="color:var(--muted);font-size:.75rem;">'+ms2s(serie.dureeMs)+' · Cible '+r.projets[si]+' km/h</div></div><button class="btn btn-secondary" style="font-size:.85rem" onclick="switchSingle()">↔ Changer</button></div><div class="card"><div class="chrono-display" id="sChronoD">00:00</div><div class="chrono-target">Obj: '+ms2s(serie.dureeMs)+'</div><div class="chrono-bar-wrap"><div class="chrono-bar" id="sBar" style="width:0%"></div></div><div class="info-grid"><div class="info-box"><div class="val accent" id="sVm">—</div><div class="lbl">Vit moy</div></div><div class="info-box"><div class="val accent" id="sVc">'+r.projets[si]+'</div><div class="lbl">Cible</div></div><div class="info-box"><div class="val accent" id="sEc">—</div><div class="lbl">Écart</div></div></div><div class="feedback-badge hidden" id="sFb">—</div><div class="btn-plot off" id="sPlot" onclick="sClickPlot()">PLOT</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><div class="btn-marche" id="sMarche" onclick="sTogMarche()">🚶 MARCHE</div><button class="btn btn-primary" id="sSS" onclick="sStartStop()">▶ DÉMARRER</button><button class="btn btn-orange" id="sStop" onclick="sStopEarly()" style="display:none">⏹ Arrêter</button><button class="btn btn-warning" id="sNext" onclick="sNextSerie()" style="display:none">→ Suivante</button></div></div></div>';
S.chrono.running=false;S.chrono.finished=false;S.chrono.elapsed=0;S.lanes[0]={plotCount:0,colCount:0,marcheNext:false};}

function sStartStop(){const si=S.chrono.serieIdx,r=_singleRunner,serie=S.series[si],d=S.data[r][si];
if(S.chrono.finished){document.getElementById('sNext').style.display='inline-flex';document.getElementById('sStop').style.display='none';return;}
if(!S.chrono.running){S.chrono.running=true;S.chrono.start=Date.now()-S.chrono.elapsed;if(d.colStarts.length===0){d.colStarts.push(0);S.lanes[0].colCount=0;S.lanes[0].plotCount=0;}document.getElementById('sSS').textContent='⏸ PAUSE';document.getElementById('sSS').className='btn btn-danger';document.getElementById('sPlot').classList.remove('off');document.getElementById('sStop').style.display='inline-flex';
S.chrono.interval=setInterval(()=>{S.chrono.elapsed=Date.now()-S.chrono.start;document.getElementById('sChronoD').textContent=ms2s(S.chrono.elapsed);const p=Math.min(S.chrono.elapsed/serie.dureeMs*100,100);const bar=document.getElementById('sBar');bar.style.width=p+'%';bar.style.background=p>95?'var(--red)':p>80?'var(--yellow)':'var(--accent)';const ce=S.chrono.elapsed-(d.colStarts[S.lanes[0].colCount]||0);if(ce>=90000&&S.lanes[0].colCount<serie.nbCols-1){S.lanes[0].colCount++;S.lanes[0].plotCount=0;d.colStarts.push(S.chrono.elapsed);}if(S.chrono.elapsed>=serie.dureeMs){clearInterval(S.chrono.interval);S.chrono.running=false;S.chrono.finished=true;document.getElementById('sSS').textContent='✓ FINI';document.getElementById('sSS').className='btn btn-success';document.getElementById('sPlot').classList.add('off');document.getElementById('sStop').style.display='none';}},100);
}else{clearInterval(S.chrono.interval);S.chrono.running=false;document.getElementById('sSS').textContent='▶ REPRENDRE';document.getElementById('sSS').className='btn btn-primary';document.getElementById('sPlot').classList.add('off');}}

function sClickPlot(){if(!S.chrono.running)return;const r=_singleRunner,si=S.chrono.serieIdx,d=S.data[r][si],L=S.lanes[0],now=S.chrono.elapsed;d.passages.push({t:now,col:L.colCount,isMarche:L.marcheNext});if(L.marcheNext)d.marcheIndices.push(d.passages.length-1);L.marcheNext=false;document.getElementById('sMarche').classList.remove('active');L.plotCount++;const cp=d.passages.filter(p=>p.col===L.colCount),cs=d.colStarts[L.colCount]||0,ce=now-cs,vc=S.runners[r].projets[si];if(ce>0&&cp.length>0){const vm=cp.length*S.distPlots/(ce/1000)*3.6,ec=vm-vc;document.getElementById('sVm').textContent=vm.toFixed(1);document.getElementById('sEc').textContent=(ec>=0?'+':'')+ec.toFixed(1);const fb=document.getElementById('sFb');if(Math.abs(ec)<=0.5){fb.className='feedback-badge ok';fb.textContent='✓ ZONE';document.getElementById('sEc').className='val green';}else if(ec>0.5){fb.className='feedback-badge fast';fb.textContent='⚡ RAPIDE';document.getElementById('sEc').className='val red';}else{fb.className='feedback-badge slow';fb.textContent='🐢 LENT';document.getElementById('sEc').className='val yellow';}}}
function sTogMarche(){S.lanes[0].marcheNext=!S.lanes[0].marcheNext;document.getElementById('sMarche').classList.toggle('active',S.lanes[0].marcheNext);}
function sStopEarly(){if(!confirm('Arrêter la série ?'))return;clearInterval(S.chrono.interval);S.chrono.running=false;S.chrono.finished=false;S.data[_singleRunner][S.chrono.serieIdx].stoppedEarly=true;S.data[_singleRunner][S.chrono.serieIdx].stoppedAtMs=S.chrono.elapsed;document.getElementById('sPlot').classList.add('off');document.getElementById('sStop').style.display='none';document.getElementById('sNext').style.display='inline-flex';document.getElementById('sSS').textContent='⏹';document.getElementById('sSS').disabled=true;}
function sNextSerie(){document.getElementById('sSS').disabled=false;for(let i=S.chrono.serieIdx+1;i<S.series.length;i++){const d=S.data[_singleRunner][i];if(!d.passages.length&&!d.stoppedEarly){S.chrono.serieIdx=i;S.chrono.elapsed=0;buildSingleCourse(_singleRunner);return;}}alert('Séries terminées pour '+S.runners[_singleRunner].name);}
function switchSingle(){if(S.chrono.running){alert("Pause d'abord");return;}const active=S.runners.map((r,i)=>({...r,i})).filter(r=>!r.dispensed);let next=_singleRunner;for(let a=0;a<S.nbRunners;a++){next=(next+1)%S.nbRunners;if(!S.runners[next].dispensed)break;}for(let i=0;i<S.series.length;i++){if(!S.data[next][i].passages.length&&!S.data[next][i].stoppedEarly){S.chrono.serieIdx=i;break;}}S.chrono.elapsed=0;buildSingleCourse(next);}

// ══════ STEP 3 — SPLIT MODE (4 élèves) ══════
let _splitRunners=[0,2]; // indices of current runners in each lane
function buildSplitCourse(rA,rB){_splitRunners=[rA,rB];const si=S.chrono.serieIdx;const c=document.getElementById('courseContainer');
// Determine observers for each runner
function getObs(ri){return S.runners.find(x=>x.dispensed&&x.observes===ri);}
// Non-dispensed partner in same binome
function getPartner(ri){const base=ri<2?0:2;const other=base+(ri===base?1:0);return S.runners[other]?.dispensed?null:other;}

const sA=S.series[si],rAr=S.runners[rA],rBr=S.runners[rB];
const obsA=getObs(rA),obsB=getObs(rB);
// The observer is the non-running partner (or dispensé)
const partA=getPartner(rA),partB=getPartner(rB);
const obsNameA=obsA?obsA.name:(partA!==null&&partA!==rA?S.runners[partA].name:'');
const obsNameB=obsB?obsB.name:(partB!==null&&partB!==rB?S.runners[partB].name:'');

c.innerHTML='<div class="global-chrono"><div class="global-chrono-time" id="gTime">00:00</div><div class="global-chrono-bar"><div class="global-chrono-bar-inner" id="gBar"></div></div><div class="global-btns"><button class="btn btn-primary" id="gSS" onclick="gStartStop()" style="font-size:.9rem;padding:8px 16px;">▶</button><button class="btn btn-warning" id="gNext" onclick="gNextSerie()" style="display:none;font-size:.8rem;padding:6px 12px;">→</button></div></div>'+
'<div class="course-split">'+buildLaneHTML(0,rA,rAr,obsNameA,si,'left')+buildLaneHTML(1,rB,rBr,obsNameB,si,'right')+'</div>';
S.chrono.running=false;S.chrono.finished=false;S.chrono.elapsed=0;
S.lanes=[{plotCount:0,colCount:0,marcheNext:false},{plotCount:0,colCount:0,marcheNext:false}];}

function buildLaneHTML(lane,rIdx,runner,obsName,si,side){
const serie=S.series[si];
return '<div class="lane '+side+'" id="lane'+lane+'"><div class="lane-header"><div class="lane-runner">'+runner.name+'</div>'+(obsName?'<div class="lane-observer">👁 '+obsName+'</div>':'')+'<div class="lane-serie">S'+(si+1)+' · '+ms2s(serie.dureeMs)+' · '+runner.projets[si]+' km/h</div></div><div class="lane-chrono" id="lc'+lane+'">00:00</div><div class="lane-target">Obj: '+ms2s(serie.dureeMs)+'</div><div class="lane-bar"><div class="lane-bar-inner" id="lb'+lane+'"></div></div><div class="lane-info"><div class="lane-info-box"><div class="v accent" id="lvm'+lane+'">—</div><div class="l">Vit</div></div><div class="lane-info-box"><div class="v accent">'+runner.projets[si]+'</div><div class="l">Cible</div></div><div class="lane-info-box"><div class="v accent" id="lec'+lane+'">—</div><div class="l">Écart</div></div></div><div class="lane-feedback" id="lfb'+lane+'"></div><div class="lane-plot off" id="lp'+lane+'" onclick="lClickPlot('+lane+')">PLOT</div><div class="lane-btns"><div class="lane-btn lane-btn-marche" id="lm'+lane+'" onclick="lTogMarche('+lane+')">🚶</div><button class="lane-btn lane-btn-stop" id="ls'+lane+'" onclick="lStopEarly('+lane+')" style="display:none">⏹</button></div></div>';}

function gStartStop(){const si=S.chrono.serieIdx,serie=S.series[si];
if(S.chrono.finished){document.getElementById('gNext').style.display='inline-flex';return;}
if(!S.chrono.running){S.chrono.running=true;S.chrono.start=Date.now()-S.chrono.elapsed;
// Init colStarts for both lanes
[0,1].forEach(l=>{const ri=_splitRunners[l],d=S.data[ri][si];if(d.colStarts.length===0){d.colStarts.push(0);S.lanes[l].colCount=0;S.lanes[l].plotCount=0;}if(!d.stoppedEarly)document.getElementById('lp'+l).classList.remove('off');document.getElementById('ls'+l).style.display=d.stoppedEarly?'none':'inline-flex';});
document.getElementById('gSS').textContent='⏸';document.getElementById('gSS').className='btn btn-danger';
S.chrono.interval=setInterval(()=>{S.chrono.elapsed=Date.now()-S.chrono.start;document.getElementById('gTime').textContent=ms2s(S.chrono.elapsed);
[0,1].forEach(l=>{document.getElementById('lc'+l).textContent=ms2s(S.chrono.elapsed);const p=Math.min(S.chrono.elapsed/serie.dureeMs*100,100);document.getElementById('lb'+l).style.width=p+'%';});
document.getElementById('gBar').style.width=Math.min(S.chrono.elapsed/serie.dureeMs*100,100)+'%';
// Update col counts
[0,1].forEach(l=>{const ri=_splitRunners[l],d=S.data[ri][si];if(d.stoppedEarly)return;const ce=S.chrono.elapsed-(d.colStarts[S.lanes[l].colCount]||0);if(ce>=90000&&S.lanes[l].colCount<serie.nbCols-1){S.lanes[l].colCount++;S.lanes[l].plotCount=0;d.colStarts.push(S.chrono.elapsed);}});
if(S.chrono.elapsed>=serie.dureeMs){clearInterval(S.chrono.interval);S.chrono.running=false;S.chrono.finished=true;document.getElementById('gSS').textContent='✓';document.getElementById('gSS').className='btn btn-success';[0,1].forEach(l=>{document.getElementById('lp'+l).classList.add('off');document.getElementById('ls'+l).style.display='none';});}},100);
}else{clearInterval(S.chrono.interval);S.chrono.running=false;document.getElementById('gSS').textContent='▶';document.getElementById('gSS').className='btn btn-primary';[0,1].forEach(l=>document.getElementById('lp'+l).classList.add('off'));}}

function lClickPlot(lane){if(!S.chrono.running)return;const ri=_splitRunners[lane],si=S.chrono.serieIdx,d=S.data[ri][si],L=S.lanes[lane],now=S.chrono.elapsed;if(d.stoppedEarly)return;d.passages.push({t:now,col:L.colCount,isMarche:L.marcheNext});if(L.marcheNext)d.marcheIndices.push(d.passages.length-1);L.marcheNext=false;document.getElementById('lm'+lane).classList.remove('active');L.plotCount++;
const cp=d.passages.filter(p=>p.col===L.colCount),cs=d.colStarts[L.colCount]||0,ce=now-cs,vc=S.runners[ri].projets[si];if(ce>0&&cp.length>0){const vm=cp.length*S.distPlots/(ce/1000)*3.6,ec=vm-vc;document.getElementById('lvm'+lane).textContent=vm.toFixed(1);document.getElementById('lec'+lane).textContent=(ec>=0?'+':'')+ec.toFixed(1);const fb=document.getElementById('lfb'+lane);if(Math.abs(ec)<=0.5){fb.className='lane-feedback ok';fb.textContent='✓ ZONE';document.getElementById('lec'+lane).className='v green';}else if(ec>0.5){fb.className='lane-feedback fast';fb.textContent='⚡ RAPIDE';document.getElementById('lec'+lane).className='v red';}else{fb.className='lane-feedback slow';fb.textContent='🐢 LENT';document.getElementById('lec'+lane).className='v yellow';}}}
function lTogMarche(lane){S.lanes[lane].marcheNext=!S.lanes[lane].marcheNext;document.getElementById('lm'+lane).classList.toggle('active',S.lanes[lane].marcheNext);}
function lStopEarly(lane){const ri=_splitRunners[lane];if(!confirm('Arrêter '+S.runners[ri].name+' ?'))return;S.data[ri][S.chrono.serieIdx].stoppedEarly=true;S.data[ri][S.chrono.serieIdx].stoppedAtMs=S.chrono.elapsed;document.getElementById('lp'+lane).classList.add('off');document.getElementById('ls'+lane).style.display='none';document.getElementById('lfb'+lane).className='lane-feedback';document.getElementById('lfb'+lane).textContent='⏹ Arrêté';document.getElementById('lfb'+lane).style.color='var(--orange)';}

function gNextSerie(){
// In split mode: after a serie, swap runners within each binôme
// The observer becomes runner and vice versa
const si=S.chrono.serieIdx;
// Find next serie
let nextSi=-1;for(let i=si+1;i<S.series.length;i++){nextSi=i;break;}
if(nextSi===-1){alert('Toutes les séries terminées !');return;}

// Swap within each binôme: the partner who didn't run now runs
function swapBinome(base){const r0=base,r1=base+1;const wasRunning=_splitRunners.includes(r0)?r0:r1;const partner=wasRunning===r0?r1:r0;// If partner is dispensed, same runner continues
if(S.runners[partner].dispensed)return wasRunning;return partner;}
const newA=swapBinome(0),newB=swapBinome(2);

S.chrono.serieIdx=nextSi;S.chrono.elapsed=0;document.getElementById('gNext').style.display='none';
buildSplitCourse(newA,newB);}

// ══════ STEP 4 — RESULTS ══════
function goStep4(){if(S.chrono.running){alert('Arrêtez d\'abord');return;}renderResults();goStep(3);}
function calcStats(r,si){const runner=S.runners[r],serie=S.series[si],d=S.data[r][si];const n=d.passages.length,dist=n*S.distPlots;const dur=d.stoppedEarly?d.stoppedAtMs:serie.dureeMs;const vm=dur>0?(dist/(dur/1000)*3.6):0;const c=runner.projets[si]||0,ec=vm-c;return{n,dist,dur,vm,c,ec,zone:Math.abs(ec)<=0.5,marches:d.marcheIndices.length,stopped:d.stoppedEarly};}
function renderResults(){const w=document.getElementById('resultsContent');let h='<p style="color:var(--muted);margin-bottom:14px;font-size:.85rem">'+S.nomSeance+(S.nomClasse?' · '+S.nomClasse:'')+' · '+S.dateSeance+'</p>';
for(let r=0;r<S.nbRunners;r++){const rr=S.runners[r];if(rr.dispensed){h+='<div class="result-block dispensed"><h3 style="color:var(--orange)">🩹 '+rr.name+' — Dispensé</h3><p style="color:var(--muted);font-size:.8rem">Observateur de '+(S.runners[rr.observes]?.name||'—')+'</p></div>';continue;}
h+='<div class="result-block"><h3>'+rr.name+' — VMA '+rr.vma+'</h3>';S.series.forEach((_,si)=>{const st=calcStats(r,si);h+='<div style="margin:6px 0;padding:6px;background:var(--bg);border-radius:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:.85rem"><span style="font-family:Bebas Neue;color:var(--accent)">S'+(si+1)+'</span><span style="color:var(--muted);font-size:.75rem">'+ms2s(st.dur)+(st.stopped?' ⏹':'')+'</span><span>'+st.n+'p · '+st.dist+'m</span><b style="color:'+(st.zone?'var(--green)':st.ec>0.5?'var(--red)':'var(--yellow)')+'">'+st.vm.toFixed(1)+' km/h</b><span class="tag '+(st.zone?'tag-green':'tag-red')+'">'+(st.zone?'✓':st.ec>0.5?'⚡':'🐢')+'</span>'+(st.stopped?'<span class="tag tag-orange">⏹</span>':'')+(st.marches?'<span class="tag tag-red">🚶'+st.marches+'</span>':'')+'</div>';});h+='</div>';}
w.innerHTML=h;}

// ══════ STEP 5 — QR ══════
function goStep5(){goStep(4);const g=document.getElementById('qrGrid');g.innerHTML='';
for(let r=0;r<S.nbRunners;r++){if(S.runners[r].dispensed)continue;const rr=S.runners[r];
const pl={v:1,seance:S.nomSeance,classe:S.nomClasse,date:S.dateSeance,distPlots:S.distPlots,distPiste:S.distPiste,series:S.series.map(s=>({dureeMs:s.dureeMs,nbCols:s.nbCols})),runner:{name:rr.name,vma:rr.vma,series:S.series.map((_,si)=>{const st=calcStats(r,si);return{idx:si,dureeMs:st.dur,nbCols:S.series[si].nbCols,cible:st.c,pctVma:Math.round(st.c/rr.vma*100),passages:st.n,dist:st.dist,vitMoy:+st.vm.toFixed(2),ecart:+st.ec.toFixed(2),zone:st.zone,marches:st.marches};})}};
const j=JSON.stringify(pl),cmp=LZString.compressToEncodedURIComponent(j),url=AGG_URL+'?d='+cmp;const bs=new TextEncoder().encode(url).length,ok=bs<=2300;
const card=document.createElement('div');card.className='qr-card';card.dataset.url=url;
card.innerHTML='<h3>'+rr.name+'</h3><div class="qr-wrap" id="qr'+r+'"></div><div class="qr-status '+(ok?'ok':'warn')+'">'+(ok?'✓ OK':'⚠ Dense')+'</div><div class="scanner-url">'+url+'</div><div style="margin-top:8px"><button class="btn btn-secondary" style="font-size:.75rem;padding:6px 10px" onclick="cpUrl(this)">📋 Copier</button></div>';
g.appendChild(card);
try{new QRCode(document.getElementById('qr'+r),{text:url,width:200,height:200,correctLevel:ok?QRCode.CorrectLevel.M:QRCode.CorrectLevel.L});}catch(e){document.getElementById('qr'+r).innerHTML='<p style="color:var(--red);font-size:.75rem">❌ Trop gros</p>';}}}
function cpUrl(btn){const u=btn.closest('.qr-card').dataset.url;navigator.clipboard.writeText(u).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='📋 Copier',1500);});}

// ══════ EXPORT ══════
function exportCSV(){const rows=[['Séance',S.nomSeance,'Classe',S.nomClasse,'Date',S.dateSeance],[]];
for(let r=0;r<S.nbRunners;r++){const rr=S.runners[r];if(rr.dispensed){rows.push([rr.name,'DISPENSÉ','Observe: '+(S.runners[rr.observes]?.name||'')]);rows.push([]);continue;}
rows.push([rr.name,'VMA '+rr.vma]);rows.push(['Série','Durée','Cible','%VMA','Passages','Dist','VitMoy','Écart','Zone','Marches','Arrêt']);
S.series.forEach((_,si)=>{const st=calcStats(r,si);rows.push(['S'+(si+1),ms2s(st.dur),st.c,Math.round(st.c/rr.vma*100)+'%',st.n,st.dist,st.vm.toFixed(1),st.ec.toFixed(1),st.zone?'OUI':'NON',st.marches,st.stopped?'OUI':'']);});rows.push([]);}
const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
const b=new Blob(['\uFEFF'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='VMA_'+(S.nomClasse||'').replace(/\s+/g,'_')+'_'+S.dateSeance+'.csv';a.click();}

// ══════ INIT ══════
document.getElementById('dateSeance').value=new Date().toISOString().slice(0,10);genSeries();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./service-worker.js',{scope:'./'}).then(function(r){console.log('[PWA]',r.scope);}).catch(function(e){console.warn(e);});});}</script>
